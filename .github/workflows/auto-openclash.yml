#=================================================
# Auto Build OpenClash Run Files
# Description: 自动检查 OpenClash 更新并打包成 .run 安装包
# Author: Custom version based on wukongdaily
#=================================================

name: Auto Build OpenClash Run Files

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时自动检查一次
  workflow_dispatch:         # 支持手动触发
    inputs:
      force_build:
        description: '强制打包（忽略版本检查）'
        required: false
        default: 'false'

env:
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  check_version:
    name: Check OpenClash Version
    runs-on: ubuntu-22.04
    outputs:
      has_update: ${{ steps.compare_versions.outputs.has_update }}
      new_version: ${{ steps.get_versions.outputs.latest_version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get versions
        id: get_versions
        run: |
          # 获取当前 release 的最新版本
          echo "获取当前仓库的最新版本..."
          CURRENT_VERSION=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            jq -r '.tag_name // ""')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $CURRENT_VERSION"
          
          # 获取 OpenClash 最新版本
          echo "获取 OpenClash 最新版本..."
          git clone --depth 1 --branch package https://github.com/vernesong/OpenClash.git temp_openclash
          if [ -f "temp_openclash/master/version" ]; then
            LATEST_VERSION=$(head -n 1 temp_openclash/master/version | tr -d ' \n\r')
          else
            LATEST_VERSION=$(date '+%Y%m%d')
            echo "警告：未找到 version 文件，使用日期作为版本"
          fi
          rm -rf temp_openclash
          
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "OpenClash 最新版本: $LATEST_VERSION"
          
      - name: Compare versions
        id: compare_versions
        run: |
          CURRENT="${{ steps.get_versions.outputs.current_version }}"
          LATEST="${{ steps.get_versions.outputs.latest_version }}"
          FORCE="${{ github.event.inputs.force_build }}"
          
          echo "当前版本: $CURRENT"
          echo "最新版本: $LATEST"
          echo "强制打包: $FORCE"
          
          # 版本对比
          if [ "$FORCE" == "true" ]; then
            echo "强制打包模式"
            echo "has_update=true" >> $GITHUB_OUTPUT
          elif [ -z "$CURRENT" ] || [ "$CURRENT" == "null" ]; then
            echo "首次运行，触发打包"
            echo "has_update=true" >> $GITHUB_OUTPUT
          elif [ -z "$LATEST" ] || [ "$LATEST" == "null" ]; then
            echo "无法获取最新版本，触发打包"
            echo "has_update=true" >> $GITHUB_OUTPUT
          elif [ "$CURRENT" != "$LATEST" ]; then
            echo "发现新版本: $LATEST"
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "没有新版本，当前版本: $CURRENT"
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

  build_package:
    name: Build OpenClash Package
    needs: check_version
    if: needs.check_version.outputs.has_update == 'true'
    runs-on: ubuntu-22.04
    
    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h
          
      - name: Create working directories
        run: |
          mkdir -p OpenClash
          mkdir -p openclash-x86
          mkdir -p openclash-a53
          mkdir -p Meta
          mkdir -p output
          echo "工作目录创建完成"
          
      - name: Checkout OpenClash package branch
        uses: actions/checkout@v4
        with:
          repository: vernesong/OpenClash
          path: OpenClash
          ref: package
          
      - name: Copy OpenClash IPK files
        run: |
          echo "复制 IPK 文件..."
          
          # 复制文件
          cp OpenClash/master/*.ipk openclash-x86/ 2>/dev/null || true
          cp OpenClash/master/*.ipk openclash-a53/ 2>/dev/null || true
          
          # 显示文件列表
          echo "x86 目录内容："
          ls -la openclash-x86/
          echo "a53 目录内容："
          ls -la openclash-a53/
          
          # 修正：使用 ls 检查文件是否存在（不支持通配符）
          if ls openclash-x86/*.ipk 1>/dev/null 2>&1; then
            echo "✅ IPK 文件复制成功"
          else
            echo "❌ 错误：openclash-x86 目录中没有 .ipk 文件"
            exit 1
          fi
          
      - name: Get version info
        id: version_info
        run: |
          if [ -f "OpenClash/master/version" ]; then
            VERSION=$(head -n 1 OpenClash/master/version | tr -d ' \n\r')
          else
            VERSION=$(date '+%Y%m%d')
            echo "警告：未找到 version 文件，使用日期作为版本"
          fi
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "OpenClash 版本: $VERSION"
          
      - name: Create Meta directory
        run: mkdir Meta
      
      - name: Checkout OpenClash core branch
        uses: actions/checkout@v4
        with:
          repository: vernesong/OpenClash
          path: Meta
          ref: core
      
      - name: List all cores
        run: |
          echo "可用的 Meta 内核："
          ls -la Meta/master/meta/ || echo "meta 目录不存在"
          
      - name: Copy latest meta core
        run: |
          # x86 版本
          echo "处理 x86_64 版本..."
          if [ -f "Meta/master/meta/clash-linux-amd64-v1.tar.gz" ]; then
            tar -xzvf Meta/master/meta/clash-linux-amd64-v1.tar.gz -C openclash-x86
            if [ -f "openclash-x86/clash" ]; then
              mv openclash-x86/clash openclash-x86/clash_meta
              echo "✅ x86_64 Meta 内核处理完成"
            else
              echo "❌ 错误：解压后未找到 clash 文件"
              exit 1
            fi
          else
            echo "❌ 错误：未找到 x86_64 Meta 内核"
            exit 1
          fi
          
          # ARM64 版本
          echo "处理 ARM64 版本..."
          if [ -f "Meta/master/meta/clash-linux-arm64.tar.gz" ]; then
            tar -xzvf Meta/master/meta/clash-linux-arm64.tar.gz -C openclash-a53
            if [ -f "openclash-a53/clash" ]; then
              mv openclash-a53/clash openclash-a53/clash_meta
              echo "✅ ARM64 Meta 内核处理完成"
            else
              echo "❌ 错误：解压后未找到 clash 文件"
              exit 1
            fi
          else
            echo "❌ 错误：未找到 ARM64 Meta 内核"
            exit 1
          fi
          
          echo "最终文件列表："
          ls -la openclash-x86/
          ls -la openclash-a53/
          
      - name: Create install.sh script
        run: |
          cat << 'EOF' > openclash-x86/install.sh
          #!/bin/sh
          echo "开始安装 OpenClash..."
          
          # 更新软件源
          echo "更新软件源..."
          opkg update
          if [ $? -ne 0 ]; then
              echo "警告：软件源更新失败，继续尝试安装..."
          fi
          
          # 安装 IPK
          echo "安装 OpenClash IPK..."
          opkg install *.ipk
          if [ $? -ne 0 ]; then
              echo "错误：IPK 安装失败"
              exit 1
          fi
          
          # 创建 core 目录
          mkdir -p /etc/openclash/core
          
          # 复制 Meta 内核
          echo "安装 Meta 内核..."
          if [ -f "clash_meta" ]; then
            mv clash_meta /etc/openclash/core/
            chmod +x /etc/openclash/core/clash_meta
            echo "✅ Meta 内核安装完成"
          else
            echo "❌ 错误：未找到 clash_meta 文件"
            exit 1
          fi
          
          echo "✅ OpenClash 安装完成！"
          echo "请前往 LuCI 界面配置 OpenClash"
          EOF
          
          # 复制到 ARM 版本
          cp openclash-x86/install.sh openclash-a53/install.sh
          
          # 添加执行权限
          chmod +x openclash-x86/install.sh
          chmod +x openclash-a53/install.sh
          
          echo "✅ 安装脚本创建完成"
          
      - name: Clone makeself
        run: |
          git clone https://github.com/megastep/makeself.git
          echo "✅ makeself 克隆完成"
          
      - name: Create run files
        run: |
          # 移动目录到 makeself
          mv openclash-x86 makeself/
          mv openclash-a53 makeself/
          
          # 进入 makeself 目录
          cd makeself
          
          # 创建 x86 版本的 run 文件（与原 yaml 完全一致）
          echo "创建 x86_64 版本的 run 文件..."
          ./makeself.sh openclash-x86/ openclash-x86-64-${{ env.version }}.run \
            "by github action" ./install.sh
          
          # 创建 ARM 版本的 run 文件（与原 yaml 完全一致）
          echo "创建 ARM64 版本的 run 文件..."
          ./makeself.sh openclash-a53/ openclash-aarch64-${{ env.version }}.run \
            "by github action" ./install.sh
          
          # 创建 MD5 校验文件
          if [ -f "openclash-x86-64-${{ env.version }}.run" ] && [ -f "openclash-aarch64-${{ env.version }}.run" ]; then
            md5sum *.run > checksums.md5
            echo "✅ MD5 校验文件创建完成"
          else
            echo "❌ 错误：run 文件创建失败"
            ls -la
            exit 1
          fi
          
          # 移动回 output 目录
          mv *.run ../output/
          mv checksums.md5 ../output/
          cd ..
          
          echo "✅ Run 文件创建完成"
          ls -la output/
          
      - name: Create release notes
        run: |
          cat > release_notes.md << EOF
          # OpenClash ${{ env.version }}
          
          ## 📦 包含组件
          - OpenClash IPK: 最新版
          - Meta 内核: 最新版
          
          ## 🖥️ 支持平台
          - **x86_64**: 适用于大多数 x86 软路由
          - **aarch64**: 适用于 ARM 设备（树莓派、R2S、R4S 等）
          
          ## 📥 安装方法
          1. 下载对应平台的 .run 文件
          2. 上传到 OpenWrt 设备
          3. 添加执行权限：\`chmod +x *.run\`
          4. 运行安装：\`./文件名.run\`
          
          ## 🔍 文件校验
          \`\`\`
          $(cat output/checksums.md5 2>/dev/null || echo "校验文件生成中")
          \`\`\`
          
          ## ⏰ 构建信息
          - 构建时间: $(date '+%Y-%m-%d %H:%M:%S')
          - OpenClash 版本: ${{ env.version }}
          
          ---
          > 由 GitHub Actions 自动构建
          EOF
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.version }}
          name: "OpenClash ${{ env.version }} 自动构建版"
          body_path: release_notes.md
          files: |
            output/*.run
            output/checksums.md5
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            makeself/*.log
            *.log
          retention-days: 7
          
      - name: Send success notification
        if: success()
        run: |
          echo "✅ OpenClash ${{ env.version }} 构建成功并已发布"
          echo "下载地址: https://github.com/${{ github.repository }}/releases/tag/${{ env.version }}"
          
      - name: Cleanup
        if: always()
        run: |
          echo "清理临时文件..."
          rm -rf OpenClash Meta makeself temp_* output
          echo "✅ 清理完成"
