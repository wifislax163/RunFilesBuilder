name: Cleanup Workflow Runs

on:
  schedule:
    - cron: '20 20 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old auto openclash runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取 auto openclash 工作流的 ID
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows -q '.workflows[] | select(.name=="auto openclash") | .id')
          
          # 删除该工作流中除最新 10 条外的所有已完成记录
          gh api repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/runs \
            --paginate -q '.workflow_runs[] | select(.status=="completed") | .id' | \
            head -n -10 | \
            while read id; do
              echo "Deleting auto openclash run ID: $id"
              gh api -X DELETE repos/${{ github.repository }}/actions/runs/$id
            done
