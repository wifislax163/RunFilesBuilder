name: Cleanup Workflow Runs

on:
  schedule:
    - cron: '20 20 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取所有工作流ID
          for workflow_id in $(gh api repos/${{ github.repository }}/actions/workflows --paginate -q '.workflows[].id'); do
            echo "Processing workflow ID: $workflow_id"
            
            # 获取该工作流的所有已完成运行ID
            run_ids=$(gh api repos/${{ github.repository }}/actions/workflows/$workflow_id/runs --paginate -q '.workflow_runs[].id')
            
            # 跳过第一个（最新），删除后面的
            count=0
            for run_id in $run_ids; do
              count=$((count + 1))
              if [ $count -gt 1 ]; then
                echo "Deleting run ID: $run_id"
                gh api -X DELETE repos/${{ github.repository }}/actions/runs/$run_id
              fi
            done
          done
